name: Android CI/CD

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]
  workflow_dispatch:

jobs:
  build:
    name: Build, Test & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Secret length: ${#KEYSTORE_BASE64}"
            # Remove all whitespace and newlines from the input
            clean_secret=$(echo "$KEYSTORE_BASE64" | tr -d '[:space:]')
            echo "$clean_secret" | base64 -d > release.keystore
            if [ $? -eq 0 ]; then
              echo "Keystore successfully decoded."
            else
              echo "Error decoding keystore."
              exit 1
            fi
          fi

      - name: Build Release App Bundle (AAB)
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -f release.keystore ]; then
            ./gradlew bundleRelease \
              -Pandroid.signingConfigs.release.storeFile=$(pwd)/release.keystore \
              -Pandroid.signingConfigs.release.storePassword="$STORE_PASSWORD" \
              -Pandroid.signingConfigs.release.keyAlias="$KEY_ALIAS" \
              -Pandroid.signingConfigs.release.keyPassword="$KEY_PASSWORD"
          else
            echo "Keystore not found, skipping signing."
            ./gradlew bundleRelease
          fi

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/bundle/release/app-release.aab

      - name: Upload to Google Play
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$SERVICE_ACCOUNT_JSON" ]; then
            echo "$SERVICE_ACCOUNT_JSON" > service-account.json
            npx upload-google-play@latest --serviceAccountJson service-account.json --packageName com.kuoyaoming.gpspy --releaseFiles app/build/outputs/bundle/release/app-release.aab --track internal
          else
            echo "Skipping Play Store upload as SERVICE_ACCOUNT_JSON is not set."
          fi