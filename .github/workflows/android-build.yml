name: Android CI/CD

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]
  workflow_dispatch:

jobs:
  build:
    name: Build, Test & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Decode Keystore
        id: decode_keystore
        if: secrets.KEYSTORE_BASE64 != ''
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.keystore

      - name: Build Release App Bundle (AAB)
        if: secrets.KEYSTORE_BASE64 != ''
        run: |
          ./gradlew bundleRelease \
            -Pandroid.signingConfigs.release.storeFile=$(pwd)/release.keystore \
            -Pandroid.signingConfigs.release.storePassword="${{ secrets.STORE_PASSWORD }}" \
            -Pandroid.signingConfigs.release.keyAlias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.signingConfigs.release.keyPassword="${{ secrets.KEY_PASSWORD }}"

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release AAB Artifact
        if: secrets.KEYSTORE_BASE64 != ''
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/bundle/release/app-release.aab

      - name: Upload to Google Play
        if: secrets.SERVICE_ACCOUNT_JSON != ''
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: com.kuoyaoming.gpspy
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: internal